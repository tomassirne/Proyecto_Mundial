# .github/workflows/pipeline.yml
# ============================================================
# Pipeline diario · Mundial 2026
# Corre todos los días a las 9:00 AM (Argentina, UTC-3)
# = 12:00 UTC → captura resultados de la noche anterior
# ============================================================

name: Mundial 2026 · Pipeline diario

on:
  schedule:
    # 12:00 UTC = 09:00 AM Argentina (UTC-3)
    # Ajustá si el Mundial tiene partidos muy nocturnos
    - cron: "0 12 * * *"

  # Permite correrlo manualmente desde GitHub Actions
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install requests psycopg2-binary python-dotenv

      - name: Correr pipeline
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          SUPABASE_DB_URL:  ${{ secrets.SUPABASE_DB_URL }}
        run: python pipeline.py
